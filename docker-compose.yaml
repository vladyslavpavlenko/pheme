services:
  node1:
    build: .
    command: ["-id", "node-1", "-bind", "0.0.0.0:7946", "-api", "0.0.0.0:7947", "-zone", "zone-a"]
    ports:
      - "7947:7947"
    networks:
      - gossip-net

  node2:
    build: .
    command: ["-id", "node-2", "-bind", "0.0.0.0:7946", "-api", "0.0.0.0:7947", "-zone", "zone-a"]
    environment:
      JOIN_ADDRS: "node1:7946"
    networks:
      - gossip-net

  node3:
    build: .
    command: ["-id", "node-3", "-bind", "0.0.0.0:7946", "-api", "0.0.0.0:7947", "-zone", "zone-b"]
    environment:
      JOIN_ADDRS: "node1:7946"
    networks:
      - gossip-net

  node4:
    build: .
    command: ["-id", "node-4", "-bind", "0.0.0.0:7946", "-api", "0.0.0.0:7947", "-zone", "zone-b"]
    environment:
      JOIN_ADDRS: "node1:7946,node3:7946"
    networks:
      - gossip-net

  node5:
    build: .
    command: ["-id", "node-5", "-bind", "0.0.0.0:7946", "-api", "0.0.0.0:7947", "-zone", "zone-c"]
    environment:
      JOIN_ADDRS: "node1:7946,node3:7946"
    networks:
      - gossip-net

networks:
  gossip-net:
    driver: bridge
